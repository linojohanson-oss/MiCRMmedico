{% extends 'base.html' %}

{% block title %}Agregar Cita | CRM Médico{% endblock %}

{% block content %}

<style>

    .form-header {
        background: linear-gradient(135deg, #3498db, #2c3e50);
        color: white;
        border-radius: 22px;
        padding: 32px;
        margin-bottom: 28px;
        box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }

    .form-header h1 {
        font-weight: 800;
        margin-bottom: 8px;
    }

    .form-card {
        background: white;
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 6px 18px rgba(0,0,0,.08);
        border-left: 6px solid #3498db;
    }

    .form-label {
        font-weight: 700;
        color: #2c3e50;
    }

    .form-control,
    .form-select {
        border-radius: 12px;
        padding: 12px 14px;
    }

    .form-control:focus,
    .form-select:focus {
        box-shadow: 0 0 0 .2rem rgba(52,152,219,.18);
    }

    .patient-chip {
        display: inline-block;
        background: rgba(255,255,255,.18);
        border: 1px solid rgba(255,255,255,.25);
        padding: 8px 14px;
        border-radius: 999px;
        margin-top: 12px;
        font-weight: 700;
    }

    .actions-bar {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
    }

    .btn-action {
        border-radius: 12px;
        padding: 11px 20px;
        font-weight: 700;
    }

</style>

<div class="form-header">

    <h1>Agregar Cita</h1>

    <p class="mb-0">
        Registrar un nuevo turno médico para el paciente.
    </p>

    <div class="patient-chip">
        <i class="fa-solid fa-user"></i>
        Paciente ID: #{{ cliente_id }}
    </div>

</div>

<div class="form-card">

    <form method="POST">

        <div class="row g-4">

            <div class="col-md-6">

                <label for="fecha" class="form-label">
                    <i class="fa-solid fa-calendar-days"></i>
                    Fecha y hora
                </label>

                <input type="datetime-local"
                       class="form-control"
                       id="fecha"
                       name="fecha"
                       required>

            </div>

            <div class="col-md-6">

                <label for="doctor_id" class="form-label">
                    <i class="fa-solid fa-user-doctor"></i>
                    Doctor
                </label>

                <select class="form-select"
                        id="doctor_id"
                        name="doctor_id"
                        required>

                    <option value="">
                        Seleccionar doctor
                    </option>

                    {% for doctor in doctores %}

                    <option value="{{ doctor[0] }}">
                        {{ doctor[1] }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-12">

                <label for="descripcion" class="form-label">
                    <i class="fa-solid fa-file-medical"></i>
                    Descripción
                </label>

                <textarea class="form-control"
                          id="descripcion"
                          name="descripcion"
                          rows="4"
                          placeholder="Motivo de la consulta, control, seguimiento, etc."
                          required></textarea>

            </div>

        </div>

        <div class="actions-bar">

            <a href="{{ url_for('citas.ver_citas', cliente_id=cliente_id) }}"
               class="btn btn-outline-secondary btn-action">

                ↩ Cancelar

            </a>

            <button type="submit"
                    class="btn btn-primary btn-action">

                💾 Guardar cita

            </button>

        </div>

    </form>

</div>

{% endblock %}
