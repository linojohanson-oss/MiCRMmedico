<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Atenciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="text-primary mb-4">📋 Historial de Atenciones</h2>

    <a href="{{ url_for('menu_movil') }}" class="btn btn-secondary mb-3">↩ Volver al Menú</a>

    {% if atenciones %}
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Paciente</th>
                <th>Doctor</th>
                <th>Especialidad</th>
                <th>Diagnóstico</th>
            </tr>
        </thead>
        <tbody>
            {% for a in atenciones %}
            <tr>
                <td>{{ a.fecha }}</td>
                <td>{{ a.paciente }}</td>
                <td>{{ a.doctor }}</td>
                <td>{{ a.especialidad }}</td>
                <td>{{ a.diagnostico }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="alert alert-warning">No hay atenciones registradas.</div>
    {% endif %}
</div>
</body>
</html>
