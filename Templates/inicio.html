<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .card-menu {

            font-weight: 600;
        }

            <a href="{{ url_for('doctores.gestionar_doctores') }}" class="btn btn-info btn-lg text-white">

            <a href="{{ url_for('citas.calendario') }}" class="btn btn-success btn-lg">
