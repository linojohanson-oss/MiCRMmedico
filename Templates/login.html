<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | CRM Médico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
                url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,.12);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 35px rgba(0,0,0,.25);
            border: 1px solid rgba(255,255,255,.18);
            color: white;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo i {
            font-size: 58px;
            margin-bottom: 15px;
            color: #7cc4ff;
        }

        .login-logo h1 {
            font-weight: 800;
            margin-bottom: 8px;
        }

        .login-logo p {
            opacity: .85;
            margin: 0;
        }

        .form-label {
            font-weight: 600;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px;
            border: none;
            margin-bottom: 18px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(52,152,219,.35);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            border: none;
            font-weight: 700;
            font-size: 17px;
            transition: all .25s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            opacity: .95;
        }

        .footer-login {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            opacity: .8;
        }

        .alert {
            border-radius: 12px;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="login-logo">
        <i class="fa-solid fa-heart-pulse"></i>
        <h1>CRM Médico</h1>
        <p>Sistema integral de gestión clínica</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Usuario
            </label>

            <input type="text"
                   name="usuario"
                   class="form-control"
                   placeholder="Ingrese su usuario"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Contraseña
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Ingrese su contraseña"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login">

            <i class="fa-solid fa-right-to-bracket"></i>
            Iniciar sesión

        </button>

    </form>

    <div class="footer-login">
        CRM Médico © 2026 | Flask + Python + MySQL
    </div>

</div>

</body>
</html>
