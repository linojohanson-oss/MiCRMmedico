<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi CRM - Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="mb-4 text-primary">Listado de Clientes</h2>

    <a href="{{ url_for('auth.inicio') }}" class="btn btn-outline-secondary mb-3">↩ Volver al Inicio</a>

    <form method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="buscar" class="form-control" placeholder="Buscar cliente..." value="{{ buscar }}">
            <button type="submit" class="btn btn-primary">🔍 Buscar</button>
        </div>
    </form>

    <div class="mb-3">
        <a href="{{ url_for('clientes.agregar') }}" class="btn btn-success">➕ Agregar Cliente</a>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-dark">🚪 Cerrar sesión</a>
    </div>

    <table class="table table-bordered table-hover shadow-sm rounded">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            {% for cliente in clientes %}
            <tr>
                <td>{{ cliente[0] }}</td>
                <td>{{ cliente[1] }}</td>
                <td>{{ cliente[2] }}</td>
                <td>{{ cliente[3] }}</td>

                <td>
                    <a href="{{ url_for('clientes.editar', id=cliente[0]) }}" class="btn btn-sm btn-warning">✏️ Editar</a>

                    <a href="{{ url_for('clientes.eliminar', id=cliente[0]) }}" class="btn btn-sm btn-danger">🗑 Eliminar</a>

                    <!-- 👇 NUEVO: CITAS -->
                    <a href="{{ url_for('citas.ver_citas', cliente_id=cliente[0]) }}" class="btn btn-sm btn-primary">
                        📅 Ver Citas
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
