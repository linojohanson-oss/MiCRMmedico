{% extends 'base.html' %}

{% block title %}Editar Cita | CRM Médico{% endblock %}

{% block content %}

<style>

    .form-header {
        background: linear-gradient(135deg, #f39c12, #d35400);
        color: white;
        border-radius: 22px;
        padding: 32px;
        margin-bottom: 28px;
        box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }

    .form-header h1 {
        font-weight: 800;
        margin-bottom: 8px;
    }

    .cita-chip {
        display: inline-block;
        background: rgba(255,255,255,.18);
        border: 1px solid rgba(255,255,255,.25);
        padding: 8px 14px;
        border-radius: 999px;
        margin-top: 12px;
        font-weight: 700;
    }

    .form-card {
        background: white;
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 6px 18px rgba(0,0,0,.08);
        border-left: 6px solid #f39c12;
    }

    .form-label {
        font-weight: 700;
        color: #2c3e50;
    }

    .form-control,
    .form-select {
        border-radius: 12px;
        padding: 12px 14px;
    }

    .form-control:focus,
    .form-select:focus {
        box-shadow: 0 0 0 .2rem rgba(243,156,18,.18);
    }

    .actions-bar {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
    }

    .btn-action {
        border-radius: 12px;
        padding: 11px 20px;
        font-weight: 700;
    }

</style>

<div class="form-header">

    <h1>Editar Cita</h1>

    <p class="mb-0">
        Modificar información del turno médico registrado.
    </p>

    <div class="cita-chip">
        <i class="fa-solid fa-calendar-check"></i>
        Cita ID: #{{ cita['id'] }}
    </div>

</div>

<div class="form-card">

    <form method="POST">

        <div class="row g-4">

            <div class="col-md-6">

                <label for="fecha" class="form-label">
                    <i class="fa-solid fa-calendar-days"></i>
                    Fecha y hora
                </label>

                <input type="datetime-local"
                       id="fecha"
                       name="fecha"
                       class="form-control"
                       value="{{ cita['fecha']|replace(' ', 'T') }}"
                       required>

            </div>

            <div class="col-md-6">

                <label for="doctor_id" class="form-label">
                    <i class="fa-solid fa-user-doctor"></i>
                    Doctor
                </label>

                <select name="doctor_id"
                        id="doctor_id"
                        class="form-select"
                        required>

                    <option value="">
                        Seleccionar doctor
                    </option>

                    {% for doctor in doctores %}

                    <option value="{{ doctor[0] }}"
                        {% if doctor[0] == cita['doctor_id'] %}selected{% endif %}>

                        {{ doctor[1] }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-12">

                <label for="descripcion" class="form-label">
                    <i class="fa-solid fa-file-medical"></i>
                    Descripción
                </label>

                <textarea id="descripcion"
                          name="descripcion"
                          class="form-control"
                          rows="4"
                          required>{{ cita['descripcion'] }}</textarea>

            </div>

        </div>

        <div class="actions-bar">

            <a href="{{ url_for('citas.ver_citas', cliente_id=cita['cliente_id']) }}"
               class="btn btn-outline-secondary btn-action">

                ↩ Cancelar

            </a>

            <button type="submit"
                    class="btn btn-warning text-white btn-action">

                ✏️ Guardar cambios

            </button>

        </div>

    </form>

</div>

{% endblock %}
