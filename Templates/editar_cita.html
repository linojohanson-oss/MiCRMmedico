<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Editar Cita</h2>

    <form method="POST">
        <div class="mb-3">
            <label for="fecha" class="form-label">Fecha</label>
            <input type="datetime-local" id="fecha" name="fecha" class="form-control"
                   value="{{ cita['fecha']|replace(' ', 'T') }}" required>
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <input type="text" id="descripcion" name="descripcion" class="form-control"
                   value="{{ cita['descripcion'] }}" required>
        </div>

        <div class="mb-3">
            <label for="doctor_id" class="form-label">Doctor</label>
            <select name="doctor_id" id="doctor_id" class="form-select" required>
                <option value="">Seleccionar doctor</option>
                {% for doctor in doctores %}
                    <option value="{{ doctor[0] }}" {% if doctor[0] == cita['doctor_id'] %}selected{% endif %}>
                        {{ doctor[1] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="{{ url_for('citas.ver_citas', cliente_id=cita['cliente_id']) }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
