<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte: Clientes sin Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Reporte: Clientes sin Citas</h2>

    <div class="mb-3">
        <a href="{{ url_for('reportes') }}" class="btn btn-secondary">Volver a Reportes</a>
    </div>

    {% if resultados %}
        <div class="card p-3 mb-4">
            <h5>Listado de Clientes</h5>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cliente in resultados %}
                        <tr>
                            <td>{{ cliente[0] }}</td>
                            <td>{{ cliente[1] }}</td>
                            <td>{{ cliente[2] }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    {% else %}
        <div class="alert alert-info">Todos los clientes tienen al menos una cita registrada.</div>
    {% endif %}
</div>
</body>
</html>
