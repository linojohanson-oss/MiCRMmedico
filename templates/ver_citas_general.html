<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario General de Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Calendario General de Citas</h2>

    <a href="{{ url_for('inicio') }}" class="btn btn-secondary mb-3">Volver</a>

    <div id="calendar" style="min-height: 600px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            events: [
                {% for cita in citas %}
                {
                    title: '{{ cita.descripcion | escape }}{% if cita.cliente %} - {{ cita.cliente | escape }}{% endif %}{% if cita.doctor %} ({{ cita.doctor | escape }}){% endif %}',
                    start: '{{ cita.fecha.isoformat() }}'
                },
                {% endfor %}
            ]
        });
        calendar.render();
    });
</script>
</body>
</html>
