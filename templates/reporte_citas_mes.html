<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte: Citas por Mes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Reporte: Citas por Mes</h2>
    <a href="{{ url_for('reportes') }}" class="btn btn-secondary mb-3">Volver a Reportes</a>

    <div class="card p-3 mb-4">
        <h5>Tabla de Citas por Mes</h5>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Cantidad de Citas</th>
                </tr>
            </thead>
            <tbody>
                {% for row in resultados %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td>{{ row[1] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="card p-3">
        <h5>Gráfico</h5>
        <canvas id="grafico" height="100"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('grafico');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels | tojson }},
            datasets: [{
                label: 'Citas por Mes',
                data: {{ data | tojson }},
                fill: false,
                borderColor: 'blue',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 }
                }
            }
        }
    });
</script>
</body>
</html>
