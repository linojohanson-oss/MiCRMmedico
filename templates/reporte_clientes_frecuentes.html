<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte: Clientes Frecuentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Reporte: Clientes con más de 3 Citas</h2>
    <a href="{{ url_for('reportes') }}" class="btn btn-secondary mb-3">Volver a Reportes</a>

    <div class="card p-3">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Cantidad de Citas</th>
                </tr>
            </thead>
            <tbody>
                {% for row in resultados %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td>{{ row[1] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
